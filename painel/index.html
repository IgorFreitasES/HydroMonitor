<!DOCTYPE html>

<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>HydroMonitor</title>

    <link
        rel="stylesheet"
        href="css/estilo.css">

</head>

<body>
<header>

    <div class="cabecalho-esquerda">

        <div class="logo">

            💧

        </div>

        <div class="titulo">

            <h1>MONITORAMENTO HÍDRICO</h1>

            <p>Sistema Supervisório</p>

        </div>

    </div>

    <div class="cabecalho-direita">

        LOGO

    </div>

</header>

<main class="conteudo">

   <section class="painel-torre">

    <svg
        id="torreSVG"
        viewBox="0 0 500 900">

        <!-- Base -->
<rect
    x="70"
    y="680"
    width="360"
    height="18"
    rx="4"
    fill="#8f8f8f"/>

<!-- Grama -->
<rect
    x="40"
    y="690"
    width="420"
    height="12"
    rx="8"
    fill="#4CAF50"/>

<!-- Reservatório Inferior -->

<ellipse
    cx="250"
    cy="520"
    rx="120"
    ry="18"
    fill="#d2d2d2"/>

<rect
    x="130"
    y="520"
    width="240"
    height="150"
    fill="#c8c8c8"/>

<ellipse
    cx="250"
    cy="670"
    rx="120"
    ry="18"
    fill="#9b9b9b"/>

<!-- Coluna esquerda -->

<rect
    x="100"
    y="120"
    width="44"
    height="550"
    rx="10"
    fill="#c4c4c4"/>

<!-- Coluna direita -->

<rect
    x="356"
    y="120"
    width="44"
    height="550"
    rx="10"
    fill="#c4c4c4"/>

<!-- Reservatório Superior -->

<g id="reservatorioSuperior">

    <!-- Tampa -->

    <ellipse
        cx="250"
        cy="105"
        rx="120"
        ry="18"
        fill="#d5d5d5"/>

    <!-- Corpo -->

    <rect
        x="130"
        y="105"
        width="240"
        height="140"
        fill="#c8c8c8"/>

    <!-- Fundo -->

    <ellipse
        cx="250"
        cy="245"
        rx="120"
        ry="18"
        fill="#9f9f9f"/>

</g>

    <!-- Água -->

<clipPath id="clipAgua">

    <rect
        x="130"
        y="105"
        width="240"
        height="140"/>

</clipPath>

<defs>

    <linearGradient id="gradienteAgua"
        x1="0%"
        y1="0%"
        x2="0%"
        y2="100%">

        <stop offset="0%" stop-color="#6ec8ff"/>

        <stop offset="60%" stop-color="#2d8cff"/>

        <stop offset="100%" stop-color="#005fd6"/>

    </linearGradient>

</defs>


<path
    id="onda"

    d="
        M130 230
        Q150 220 170 230
        T210 230
        T250 230
        T290 230
        T330 230
        T370 230

        L370 330
        L130 330
        Z"

    fill="#8fd8ff"

    opacity="0.55"

    clip-path="url(#clipAgua)"/>


<rect
    id="agua"
    clip-path="url(#clipAgua)"
    x="130"
    y="145"
    width="240"
    height="100"
    fill="#2d8cff"/>


    </svg>



    


    
</section>


</main>


<div class="painel-info">

    <h2>Status da Caixa</h2>

    <p>Nível:
        <strong id="nivelTexto">0%</strong>
    </p>

    <p>Distância:
        <strong id="distanciaTexto">0 cm</strong>
    </p>

    <p>Volume:
        <strong id="volumeTexto">0 L</strong>
    </p>

    <p>Status:
        <strong id="statusTexto">---</strong>
    </p>

</div>


<footer>

    HydroMonitor © 2026

</footer>

<script src="js/app.js" defer></script>
<script src="js/torre.js"></script>

</body>

</html>
