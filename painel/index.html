<!DOCTYPE html>

<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>HydroMonitor</title>

    <link
        rel="stylesheet"
        href="css/estilo.css">

</head>

<body>
<header class="topo">

    <div class="topo-esquerda">

        <div class="logo">

            💧

        </div>

        <div>

            <h1>HydroMonitor</h1>

            <span>Sistema Supervisório de Monitoramento Hídrico</span>

        </div>

    </div>

    <div class="topo-direita">

        <!-- Wi-Fi removido do cabeçalho -->


    </div>

</header>

<main class="dashboard">

    <!-- PAINEL ESQUERDO -->

    <aside class="painel painel-esquerdo">

        <h2>Caixa d'Água</h2>

        <div class="card">

    <span class="card-titulo">
        💧 NÍVEL DA ÁGUA
    </span>

    <div class="barra">

        <div
            id="barraNivel"
            class="barra-preenchimento">
        </div>

    </div>

    <span
        id="nivelTexto"
        class="valor-grande">

        0%

    </span>

    


    <p id="descricaoNivel" class="descricao-nivel">
    Aguardando...
</p>
    

</div>

<div class="card">

            <h3>🪣 Volume</h3>

            <strong id="volumeTexto">0 L</strong>

        </div>

       

    </aside>


    <!-- PAINEL CENTRAL -->

    <section class="painel-central">

        <svg
    id="torreSVG"
    viewBox="0 0 500 900">

    <!-- ========================= -->
    <!-- PEDESTAL -->
    <!-- ========================= -->

    <rect
    id="baseConcreto"
    x="55"
    y="705"
    width="390"
    height="32"
    rx="10"
    fill="#8b8f95"/>

    <rect
    id="grama"
    x="25"
        y="735"
        width="450"
        height="12"
        rx="10"
        fill="#43b047"/>

    <!-- ========================= -->
    <!-- RESERVATÓRIO INFERIOR -->
    <!-- ========================= -->
        <g id="reservatorioInferior">

    <ellipse
        id="tampaInferior"
        cx="250"
        cy="520"
        rx="135"
        ry="22"
        fill="#d8d8d8"/>

    <rect
        id="corpoInferior"
        x="115"
        y="520"
        width="270"
        height="165"
        fill="#cfcfcf"/>

    <ellipse
        id="fundoInferior"
        cx="250"
        cy="685"
        rx="135"
        ry="22"
        fill="#9c9c9c"/>

</g>

    <!-- ========================= -->
    <!-- RESERVATÓRIO SUPERIOR -->
    <!-- ========================= -->

    <g id="reservatorioSuperior">

    <ellipse
        id="tampaSuperior"
        cx="250"
        cy="120"
        rx="145"
        ry="22"
        fill="#dddddd"/>

    <rect
        id="corpoSuperior"
        x="105"
        y="120"
        width="290"
        height="170"
        fill="#cecece"/>

    <ellipse
        id="fundoSuperior"
        cx="250"
        cy="290"
        rx="145"
        ry="22"
        fill="#a8a8a8"/>

</g>

    <!-- ========================= -->
    <!-- COLUNAS -->
    <!-- ========================= -->

    <rect
    id="colunaEsquerda"
        x="90"
        y="118"
        width="58"
        height="567"
        rx="10"
        fill="#cfcfcf"/>

    <rect
    id="colunaDireita"
        x="352"
        y="118"
        width="58"
        height="567"
        rx="10"
        fill="#cfcfcf"/>

    <!-- ========================= -->
    <!-- ÁREA DA ÁGUA -->
    <!-- ========================= -->

    <clipPath id="clipAgua">

    <rect
        id="areaAgua"
        x="105"
            y="120"
            width="290"
            height="170"/>

    </clipPath>

               <!-- ========================= -->
    <!-- DEFINIÇÕES -->
    <!-- ========================= -->

    <defs>

        <linearGradient
    id="gradienteAgua"
    x1="0%"
    y1="0%"
    x2="0%"
    y2="100%">

    <stop offset="0%" stop-color="#bfe8ff"/>

    <stop offset="35%" stop-color="#67c4ff"/>

    <stop offset="75%" stop-color="#2b8cff"/>

    <stop offset="100%" stop-color="#0068e0"/>

</linearGradient>

        <linearGradient
            id="gradienteReflexo"
            x1="0%"
            y1="0%"
            x2="100%"
            y2="0%">

            <stop offset="0%" stop-color="rgba(255,255,255,0)"/>
            <stop offset="50%" stop-color="rgba(255,255,255,.35)"/>
            <stop offset="100%" stop-color="rgba(255,255,255,0)"/>

        </linearGradient>

    </defs>

    <!-- ========================= -->
    <!-- ÁGUA -->
    <!-- ========================= -->


       <g id="grupoAgua">

    <rect
        id="agua"
        clip-path="url(#clipAgua)"
        x="105"
        y="155"
        width="290"
        height="100"
        fill="url(#gradienteAgua)"
        opacity="0.72"/>

    <path
        id="onda"
        clip-path="url(#clipAgua)"
        d="
        M105 190

        C125 184 145 196 165 190

        S205 184 225 190

        S265 196 285 190

        S325 184 345 190

        S375 196 395 190

        L395 290

        L105 290

        Z"
        fill="#9fe2ff"
        opacity=".55"/>

    <rect
        id="reflexoAgua"
        x="116"
        y="112"
        width="8"
        height="135"
        rx="4"
        fill="white"
        opacity="0.08"/>


        <!-- ========================= -->
    <!-- BRILHO SUPERIOR -->
    <!-- ========================= -->

    <ellipse
    id="brilhoSuperior"
    cx="250"
    cy="128"

        rx="138"

        ry="8"

        fill="white"

        opacity=".18"/>

</g>




    

</svg>

    </section>


    <!-- PAINEL DIREITO -->

    <aside class="painel painel-direito">


        <h2>Monitoramento</h2>

        
         <div class="card">

            <h3>⚙ Sistema</h3>

            <strong id="statusTexto">---</strong>

        </div>
        

        <div class="card">

            <h3>⚡ Bomba</h3>

            <strong id="bombaTexto">Desligada</strong>

        </div>

        <div class="card">

            <h3>📶 Wi-Fi</h3>

            <strong id="wifiTexto">0%</strong>

        </div>

    </aside>

</main>


 


<footer>

    HydroMonitor © 2026

</footer>

<script src="js/app.js" defer></script>
<script src="js/torre.js"></script>

</body>

</html>
